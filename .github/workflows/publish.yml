name: Publish to PyPI

# Push a version tag (e.g. `git push origin v1.3.1`) and this builds the
# package and publishes it to PyPI via Trusted Publishing (OIDC — no API
# token or secret is stored). One-time setup: add a Trusted Publisher on
# https://pypi.org/manage/project/yait-aichain/settings/publishing/
# (owner: yaitio, repo: aichain, workflow: publish.yml).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Refuse to publish if the tag does not match the packaged version,
      # so `v1.3.1` can never ship a pyproject that still says 1.3.0.
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$TAG  pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match pyproject version $PKG"; exit 1
          fi

      - name: Install and test
        run: |
          pip install -e ".[all]" pytest pytest-asyncio
          # *Live* tests need real API keys; test_tool.py has a stale import path.
          pytest -k "not Live" --ignore=tests/tools/test_tool.py

      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
