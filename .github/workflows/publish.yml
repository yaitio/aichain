name: Publish to PyPI

# Push a version tag (e.g. `git push origin v1.3.1`) and this builds the
# package and publishes it to PyPI via Trusted Publishing (OIDC — no API
# token or secret is stored). One-time setup: add a Trusted Publisher on
# https://pypi.org/manage/project/yait-aichain/settings/publishing/
# (owner: yaitio, repo: aichain, workflow: publish.yml).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Refuse to publish if the tag does not match the packaged version.
      # Version is the single source of truth in yait_aichain/__init__.py
      # (__version__); pyproject reads it dynamically, so we check that file.
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import re,pathlib; print(re.search(r'__version__\s*=\s*[\x27\x22]([^\x27\x22]+)', pathlib.Path('yait_aichain/__init__.py').read_text()).group(1))")
          echo "tag=$TAG  __version__=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match yait_aichain.__version__ $PKG"; exit 1
          fi

      - name: Install and test
        run: |
          pip install -e ".[all]" pytest pytest-asyncio
          pytest -k "not Live"   # *Live* tests need real API keys; skip in CI

      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
