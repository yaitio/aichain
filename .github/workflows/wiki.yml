name: Sync wiki

# Rebuild the GitHub wiki from docs/ whenever the docs (or the sync script)
# change on main. Pages are generated by scripts/sync_wiki.py and pushed to
# the repo's .wiki.git using the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/sync_wiki.py"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:   # allow a manual run

permissions:
  contents: write      # needed to push to the wiki repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wiki pages and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki
          python scripts/sync_wiki.py wiki
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "Sync wiki from docs (${GITHUB_SHA})"
            git push
          fi
