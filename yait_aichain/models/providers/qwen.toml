# qwen — provider settings + its models (data tier)

[provider]
key      = "qwen"
client   = "qwen"
env_key  = "DASHSCOPE_API_KEY"
auth     = "bearer"
max_tokens_field = "max_completion_tokens"
models_path      = "/compatible-mode/v1/models"

chat_path        = "/compatible-mode/v1/chat/completions"
images_path      = "/compatible-mode/v1/images/generations"

[provider.defaults]
temperature = 0.7
max_tokens  = 2048
top_p = 0.8

[provider.reasoning_map]
low = true
medium = true
high = true

[models."qwen3-max"]
caps  = ["text-to-text"]
price = { input = 1.2, output = 6.0 }

[models."qwen-max"]
caps  = ["text-to-text"]
price = { input = 1.6, output = 6.4 }

[models."qwen-plus"]
caps  = ["text-to-text"]
price = { input = 0.4, output = 1.2 }

[models."qwen-turbo"]
caps  = ["text-to-text"]
price = { input = 0.05, output = 0.2 }

[models."qwen3-235b-a22b"]
caps  = ["text-to-text"]
price = { input = 0.7, output = 2.8 }

[models."qwen3-72b"]
caps  = ["text-to-text"]

[models."qwen3-32b"]
caps  = ["text-to-text"]

[models."QwQ-32B"]
caps  = ["text-to-text"]

[models."qwen3-vl-plus"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 0.2, output = 1.6 }

[models."qwen-vl-max"]
caps  = ["image-to-text"]
price = { input = 0.8, output = 3.2 }

[models."qwen-vl-plus"]
caps  = ["image-to-text"]
price = { input = 0.21, output = 0.63 }

# Text-to-image (wan series). DashScope serves these only through its native
# async task API (submit → poll → download), handled by QwenClient.
[models."wan2.2-t2i-flash"]
caps  = ["text-to-image"]

[models."wan2.2-t2i-plus"]
caps  = ["text-to-image"]

# Image editing (qwen-image-edit series). Synchronous multimodal-generation
# endpoint: input image as a base64 data-URI (or URL) + an edit instruction.
[models."qwen-image-edit"]
caps  = ["image-to-image"]

[models."qwen-image-edit-plus"]
caps  = ["image-to-image"]

[models."qwen-image-edit-max"]
caps  = ["image-to-image"]
