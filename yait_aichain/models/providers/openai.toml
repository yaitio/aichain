# openai — provider settings + its models (data tier)

[provider]
key      = "openai"
client   = "openai"
base_url = "https://api.openai.com"
env_key  = "OPENAI_API_KEY"
auth     = "bearer"
max_tokens_field = "max_completion_tokens"
models_path      = "/v1/models"

chat_path        = "/v1/chat/completions"
images_path      = "/v1/images/generations"

[provider.defaults]
temperature = 1.0
max_tokens  = 16384
top_p = 1.0

[provider.reasoning_map]
low = "low"
medium = "medium"
high = "high"

[models."gpt-5.5"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 5.0, output = 30.0 }

[models."gpt-5.5-pro"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 30.0, output = 180.0 }

[models."gpt-5.4"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 2.5, output = 15.0 }

[models."gpt-5.4-mini"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 0.75, output = 4.5 }

[models."gpt-5.4-nano"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 0.2, output = 1.25 }

[models."gpt-5.4-pro"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 30.0, output = 180.0 }

[models."gpt-4o"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 2.5, output = 10.0 }

[models."gpt-4o-mini"]
caps  = ["image-to-text", "text-to-text"]
price = { input = 0.15, output = 0.6 }

# Image-generation models. Token-priced: input = text prompt tokens,
# output = generated image tokens (USD per 1M tokens).
[models."gpt-image-2"]
caps  = ["text-to-image"]
price = { input = 5.0, output = 30.0 }

# Always-current image model used by ChatGPT (alias to the latest snapshot).
[models."chatgpt-image-latest"]
caps  = ["text-to-image"]
price = { input = 5.0, output = 30.0 }

[models."gpt-image-1.5"]
caps  = ["text-to-image"]
price = { input = 5.0, output = 32.0 }

[models."gpt-image-1-mini"]
caps  = ["text-to-image"]
price = { input = 2.0, output = 8.0 }

[models."gpt-image-1"]
caps  = ["text-to-image"]
